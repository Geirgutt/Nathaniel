<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Hopp Høyest</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <p class="label">Høyde</p>
        <p id="score" class="value">0 m</p>
      </div>
      <div>
        <p class="label">Mynter</p>
        <p id="coins" class="value">0</p>
      </div>
      <div>
        <p class="label">Level</p>
        <p id="level" class="value">1</p>
      </div>
      <div>
        <p class="label">Beste</p>
        <p id="best" class="value">0 m</p>
      </div>
    </section>

    <canvas id="game" width="420" height="720" aria-label="Spillflate"></canvas>

    <section class="controls" aria-label="Touch-kontroller">
      <button id="leftButton" class="control-button" type="button" aria-label="Gå til venstre">Venstre</button>
      <button id="rightButton" class="control-button" type="button" aria-label="Gå til høyre">Høyre</button>
    </section>

    <section class="help">
      <p>Bruk A/D, piltaster eller touch-knappene nederst.</p>
      <p>Samle mynter på vei oppover for å låse opp neste level.</p>
    </section>

    <div id="overlay" class="overlay hidden">
      <div class="panel">
        <h1>Hopp Høyest</h1>
        <p id="message">Trykk for å starte.</p>

        <section id="scoreEntry" class="score-entry hidden">
          <label class="label" for="playerName">Kallenavn</label>
          <input id="playerName" class="name-input" type="text" maxlength="16" placeholder="Skriv navn">
          <button id="saveScore" class="ghost-button wide-button" type="button">Lagre score</button>
        </section>

        <section id="leaderboardPanel" class="scoreboard hidden" aria-label="Toppliste">
          <p id="scoreStatus" class="score-status">Henter toppliste...</p>
          <ol id="leaderboard" class="leaderboard-list">
            <li>Ingen score enda.</li>
          </ol>
        </section>

        <button id="action" type="button">Start spill</button>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
